name: Smoke Cloudflare

on:
  schedule:
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
      - run: node scripts/cloudflare-smoke.mjs https://aula-base.prroyectoeducativo00.workers.dev
