name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Entorno a desplegar
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'staging' || inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.DEPLOY_STAGING_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: ${{ (github.event_name == 'push' || inputs.target == 'staging') && 'Staging' || 'Production' }}
      url: ${{ vars.APP_URL }}
    env:
      TARGET: ${{ github.event_name == 'push' && 'staging' || inputs.target }}
      APP_URL: ${{ vars.APP_URL }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Validar configuración del entorno
        run: |
          for name in APP_URL VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN SUPABASE_DB_URL; do
            if [[ -z "${!name}" ]]; then
              echo "Falta configurar $name en el GitHub Environment" >&2
              exit 1
            fi
          done

      - run: pnpm install --frozen-lockfile

      - name: Verificar migraciones pendientes
        run: pnpm exec supabase db push --db-url "$SUPABASE_DB_URL" --include-all --dry-run

      - name: Aplicar migraciones
        run: pnpm exec supabase db push --db-url "$SUPABASE_DB_URL" --include-all --yes

      - name: Compilar aplicación
        run: pnpm build

      - name: Verificar secretos del Worker
        run: |
          if [[ "$TARGET" == 'staging' ]]; then
            secrets=$(pnpm exec wrangler secret list --env staging)
          else
            secrets=$(pnpm exec wrangler secret list --env="")
          fi
          for name in JWT_SECRET OPENAI_API_KEY SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL; do
            jq -e --arg name "$name" 'any(.[]; .name == $name)' <<< "$secrets" >/dev/null || {
              echo "Falta el secreto $name en Cloudflare" >&2
              exit 1
            }
          done

      - name: Desplegar Worker
        run: |
          if [[ "$TARGET" == 'staging' ]]; then
            pnpm exec wrangler deploy --env staging
          else
            pnpm exec wrangler deploy --env=""
          fi

      - name: Smoke test
        run: pnpm cloudflare:smoke "$APP_URL"
