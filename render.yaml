services:
  - type: web
    name: aula-base-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @aula/shared build && pnpm --filter @aula/database generate && pnpm --filter @aula/database build && pnpm --filter backend build
    startCommand: node apps/backend/dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: VERCEL_PROJECT_SLUG
        value: proyecto-educativo-v3-frontend
      - key: VERCEL_TEAM_SLUG
        value: proyecto-educativo-a
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
